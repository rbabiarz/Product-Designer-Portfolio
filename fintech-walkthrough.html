<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Goals-Driven Finance, Product Walkthrough</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#0a0a0a;overflow:hidden}
  #root{position:fixed;inset:0}
</style>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
<script type="text/babel" src="animations.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
// Stage, Sprite, useTime, Easing, clamp are top-level bindings from animations.jsx

// ── palette ──────────────────────────────────────────────────────────────
const C = {
  canvas:'#fffcf5', ink:'#0F2A4A', teal:'#0d5350', tealLt:'#2f8f86',
  body:'#534f48', muted:'#8a8478', navy:'#0F2A4A', sand:'#efe6d4'
};
const FD='Inter, system-ui, sans-serif';
const FB="'DM Sans', system-ui, sans-serif";
const FM="'JetBrains Mono', ui-monospace, monospace";

// ── shot list (one entry per beat) ────────────────────────────────────────
const D = 3.2;                 // base screen duration
const OV = 0.5;                // crossfade overlap
let t = 0;
const at = (dur) => { const s = t; t += dur; return [s, t]; };

const INTRO = at(3.0);
const SH = [
  { ch:'01 · Onboarding', src:'fintech/fintech-10.png',  title:'Money that means something',  sub:'Onboarding leads with values, connection, transparency, no judgment, before it ever asks for an account.', tap:{x:140,y:470} },
  { ch:'01 · Onboarding', src:'fintech/fintech-06.png',  title:'No shame, ever',               sub:'Where other apps scold, this one shows the math, and an easy way to recover the time.', tap:{x:140,y:360} },
  { ch:'01 · Onboarding', src:'fintech/fintech-09.png',  title:'Connect, on your terms',       sub:'256-bit encryption · read-only · CFPB §1033, trust signals surfaced exactly when hesitation peaks.', tap:{x:212,y:175} },
  { ch:'01 · Onboarding', src:'fintech/fintech-04.png',  title:'Your dashboard, ready',        sub:'It closes on a populated dashboard with an animated net-worth reveal, value felt before any work.', tap:{x:140,y:560} },
  { ch:'02 · Goals & Alignment', src:'fintech/fintech-11.png', title:'One number: am I on track?', sub:'The headline isn’t a balance, it’s the Goal Alignment Score, a single read on whether today serves tomorrow.', tap:{x:90,y:130} },
  { ch:'02 · Goals & Alignment', src:'fintech/fintech-01.png', title:'Every goal, fully scoped',   sub:'Open a goal for contribution history, months-left, and conservative / expected / optimistic projections.', tap:{x:140,y:175} },
  { ch:'03 · Spending Intelligence', src:'fintech/fintech-03.png', title:'Spending as goal impact', sub:'Category pace vs. a goal-aligned target, tap any transaction to see the trade-off, never a deficit banner.', dur:3.8, tap:{x:140,y:340} },
  { ch:'04 · Invest', src:'fintech/fintech-08.png', title:'Holdings vs. what goals need', sub:'A mindful portfolio view: allocation and holdings measured against an educational reference, not stock tips.', dur:3.8, tap:{x:110,y:200} },
].map(s => { const [a,b] = at((s.dur||D)+OV); t -= OV; return { ...s, start:a, end:b }; });
t = SH[SH.length-1].end;          // outro begins only after the last shot is gone
const OUTRO = at(3.6);
const TOTAL = t;

// ── background ─────────────────────────────────────────────────────────────
function Bg(){
  const time = useTime();
  const dx = Math.sin(time*0.18)*40, dy = Math.cos(time*0.14)*30;
  return (
    <div style={{position:'absolute',inset:0,background:C.canvas,overflow:'hidden'}}>
      <div style={{position:'absolute',width:760,height:760,borderRadius:'50%',top:-260+dy,right:-160+dx,
        background:'radial-gradient(circle, rgba(13,83,80,0.13), transparent 66%)'}}/>
      <div style={{position:'absolute',width:620,height:620,borderRadius:'50%',bottom:-240-dy,left:-140-dx,
        background:'radial-gradient(circle, rgba(15,42,74,0.10), transparent 68%)'}}/>
      <div style={{position:'absolute',inset:0,
        backgroundImage:'linear-gradient(rgba(15,42,74,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(15,42,74,0.035) 1px, transparent 1px)',
        backgroundSize:'46px 46px', maskImage:'radial-gradient(circle at 50% 50%, #000, transparent 78%)',
        WebkitMaskImage:'radial-gradient(circle at 50% 50%, #000, transparent 78%)'}}/>
    </div>
  );
}

function Wordmark(){
  return (
    <div style={{position:'absolute',left:560,top:64,display:'flex',alignItems:'center',gap:11,zIndex:5}}>
      <div style={{width:11,height:11,borderRadius:3,background:C.teal,transform:'rotate(45deg)'}}/>
      <span style={{fontFamily:FD,fontSize:16,fontWeight:600,color:C.ink,letterSpacing:'-0.01em'}}>Robert Babiarz</span>
      <span style={{fontFamily:FM,fontSize:11,color:C.muted,letterSpacing:'0.12em',textTransform:'uppercase',marginLeft:4,paddingLeft:14,borderLeft:'1px solid rgba(15,42,74,0.18)'}}>Goals-Driven Finance</span>
    </div>
  );
}

// ── phone ───────────────────────────────────────────────────────────────────
const PX = 196, PY = 48, SW = 280, SH_H = 606;  // phone screen viewport
function PhoneShell(){
  const time = useTime();
  const fl = Math.sin(time*0.9)*5;
  return (
    <div style={{position:'absolute',left:PX-12,top:PY-12+fl,width:SW+24,height:SH_H+24,borderRadius:50,
      background:'linear-gradient(135deg,#56585d 0%,#202225 16%,#0a0b0c 50%,#202225 84%,#56585d 100%)',
      boxShadow:'0 0 0 1.5px #050506, 0 50px 90px -34px rgba(5,12,20,.66), inset 0 1.5px 2px rgba(255,255,255,.42)',zIndex:3}}>
      <div style={{position:'absolute',left:12,top:12,width:SW,height:SH_H,borderRadius:40,overflow:'hidden',background:'#f5f1ea'}} id="screenport">
        <Screens fl={fl}/>
      </div>
    </div>
  );
}

function Tap({x,y,localTime}){
  const period = 1.9;
  const tt = (localTime % period)/period;             // 0..1 ripple
  const r = 8 + tt*46;
  const op = (1-tt)*0.5;
  return (
    <React.Fragment>
      <div style={{position:'absolute',left:x,top:y,width:r*2,height:r*2,marginLeft:-r,marginTop:-r,
        borderRadius:'50%',border:'2px solid rgba(13,83,80,'+op+')',pointerEvents:'none'}}/>
      <div style={{position:'absolute',left:x,top:y,width:18,height:18,marginLeft:-9,marginTop:-9,
        borderRadius:'50%',background:'rgba(13,83,80,0.18)',border:'1.5px solid rgba(13,83,80,0.6)',pointerEvents:'none'}}/>
    </React.Fragment>
  );
}

function Screens(){
  return (
    <React.Fragment>
      {SH.map((s,i)=>(
        <Sprite key={i} start={s.start} end={s.end}>
          {({localTime,progress,duration})=>{
            const fin=0.5, fout=0.5;
            let op=1;
            if(localTime<fin) op=Easing.easeOutCubic(clamp(localTime/fin,0,1));
            else if(localTime>duration-fout) op=1-Easing.easeInCubic(clamp((localTime-(duration-fout))/fout,0,1));
            const scale=1+0.032*Easing.easeInOutSine(progress);
            return (
              <div style={{position:'absolute',inset:0,opacity:op}}>
                <img src={s.src} alt="" style={{position:'absolute',top:0,left:0,width:'100%',height:'auto',
                  transform:`scale(${scale})`,transformOrigin:'center center',display:'block'}}/>
                {s.tap && <Tap x={s.tap.x} y={s.tap.y} localTime={localTime}/>}
              </div>
            );
          }}
        </Sprite>
      ))}
    </React.Fragment>
  );
}

// ── right caption column ─────────────────────────────────────────────────────
const TXX = 560;
function fadeOp(localTime,duration,fin=0.5,fout=0.5){
  if(localTime<fin) return Easing.easeOutCubic(clamp(localTime/fin,0,1));
  if(localTime>duration-fout) return 1-Easing.easeInCubic(clamp((localTime-(duration-fout))/fout,0,1));
  return 1;
}
function Captions(){
  return (
    <React.Fragment>
      {SH.map((s,i)=>(
        <Sprite key={i} start={s.start} end={s.end}>
          {({localTime,duration})=>{
            const op=fadeOp(localTime,duration);
            const ty=(1-Easing.easeOutCubic(clamp(localTime/0.5,0,1)))*14;
            return (
              <div style={{position:'absolute',left:TXX,top:268,width:600,opacity:op,transform:`translateY(${ty}px)`}}>
                <div style={{fontFamily:FM,fontSize:13,letterSpacing:'0.18em',textTransform:'uppercase',color:C.teal,marginBottom:18}}>{s.ch}</div>
                <div style={{fontFamily:FD,fontSize:46,fontWeight:600,lineHeight:1.04,letterSpacing:'-1.4px',color:C.ink}}>{s.title}</div>
                <div style={{fontFamily:FB,fontSize:18.5,lineHeight:1.62,color:C.body,marginTop:20,maxWidth:540}}>{s.sub}</div>
              </div>
            );
          }}
        </Sprite>
      ))}
      {/* chapter progress pips */}
      <ProgressRail/>
    </React.Fragment>
  );
}

const CHAPS=['01 · Onboarding','02 · Goals & Alignment','03 · Spending Intelligence','04 · Invest'];
function ProgressRail(){
  const time=useTime();
  // active chapter from current shot
  let active=-1;
  for(const s of SH){ if(time>=s.start && time<=s.end){ active=CHAPS.indexOf(s.ch); } }
  return (
    <div style={{position:'absolute',left:TXX,top:600,display:'flex',gap:10,alignItems:'center'}}>
      {CHAPS.map((c,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:i===active?30:9,height:4,borderRadius:3,background:i===active?C.teal:'rgba(15,42,74,0.2)',transition:'none'}}/>
        </div>
      ))}
      <span style={{fontFamily:FM,fontSize:11,color:C.muted,letterSpacing:'0.1em',marginLeft:6}}>{active>=0?CHAPS[active].split(' · ')[1]:''}</span>
    </div>
  );
}

// ── intro / outro cards ───────────────────────────────────────────────────
function IntroCard(){
  return (
    <Sprite start={INTRO[0]} end={INTRO[1]}>
      {({localTime,duration})=>{
        const op=fadeOp(localTime,duration,0.5,0.6);
        const ty=(1-Easing.easeOutCubic(clamp(localTime/0.6,0,1)))*20;
        return (
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',opacity:op}}>
            <div style={{transform:`translateY(${ty}px)`,textAlign:'center'}}>
              <div style={{fontFamily:FM,fontSize:14,letterSpacing:'0.24em',textTransform:'uppercase',color:C.tealLt,marginBottom:24}}>Product Walkthrough</div>
              <div style={{fontFamily:FD,fontSize:92,fontWeight:600,lineHeight:0.98,letterSpacing:'-3.4px',color:C.canvas}}>Goals-Driven<br/>Finance</div>
              <div style={{fontFamily:FB,fontSize:21,color:C.muted,marginTop:26,maxWidth:680,marginLeft:'auto',marginRight:'auto',lineHeight:1.55}}>Four flows from the working iOS prototype, onboarding, goals, spending, and investing.</div>
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}
function OutroCard(){
  return (
    <Sprite start={OUTRO[0]} end={OUTRO[1]}>
      {({localTime,duration})=>{
        const op=fadeOp(localTime,duration,0.6,0.5);
        const ty=(1-Easing.easeOutCubic(clamp(localTime/0.6,0,1)))*20;
        const pulse=1+Math.sin(localTime*3)*0.012;
        return (
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',opacity:op}}>
            <div style={{transform:`translateY(${ty}px)`,textAlign:'center'}}>
              <div style={{fontFamily:FM,fontSize:13,letterSpacing:'0.2em',textTransform:'uppercase',color:C.tealLt,marginBottom:22}}>Try it yourself</div>
              <div style={{fontFamily:FD,fontSize:60,fontWeight:600,letterSpacing:'-2px',color:C.canvas,lineHeight:1.05}}>A working build,<br/>not a mockup</div>
              <div style={{display:'inline-flex',alignItems:'center',gap:11,marginTop:34,padding:'16px 30px',borderRadius:999,
                background:C.teal,color:'#fff',fontFamily:FD,fontSize:18,fontWeight:600,transform:`scale(${pulse})`,
                boxShadow:'0 18px 40px -14px rgba(13,83,80,0.6)'}}>
                rbabiarz.github.io/Fintech-Platform
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M7 17L17 7M17 7H8M17 7v9"/></svg>
              </div>
            </div>
          </div>
        );
      }}
    </Sprite>
  );
}

// ── label updater (timestamp for comments) ─────────────────────────────────
function LabelTicker(){
  const time=useTime();
  React.useEffect(()=>{
    const el=document.getElementById('vidroot');
    if(el) el.setAttribute('data-screen-label','t='+time.toFixed(0)+'s');
  },[Math.floor(time)]);
  return null;
}

function MainShots(){
  const time=useTime();
  const showStage = time>=SH[0].start && time<=SH[SH.length-1].end;
  return (
    <React.Fragment>
      {showStage && <PhoneShell/>}
      {showStage && <Captions/>}
    </React.Fragment>
  );
}

function Walkthrough(){
  return (
    <div id="vidroot" data-screen-label="t=0s" style={{position:'absolute',inset:0}}>
      <Stage width={1280} height={720} duration={TOTAL} background={C.canvas} persistKey="fintech-walkthrough">
        <Bg/>
        <Wordmark/>
        <IntroCard/>
        <MainShots/>
        <OutroCard/>
        <LabelTicker/>
      </Stage>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Walkthrough/>);
</script>
</body></html>
